version = "3.8.3"
runner.dialect = scala3
maxColumn = 100
align.preset = none

# Preserve the hand-written doc comments verbatim (they are carefully wrapped and reference
# spec/FR ids); scalafmt only enforces code layout, not prose.
docstrings.style = keep
docstrings.wrap = no

# Never format generated or build output (ScalaPB stubs live under target/.../src_managed).
project.excludePaths = [
  "glob:**/target/**",
  "glob:**/src_managed/**"
]
