name: CI

on:
  push:
    branches: ["**"]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  jvm:
    name: JVM — sbt test + labeling gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Install libsodium (crypto FFM tests)
        run: sudo apt-get update && sudo apt-get install -y libsodium-dev
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "24" # Foreign Function & Memory API is final since 22
      - uses: sbt/setup-sbt@v1
      - uses: actions/setup-node@v4
        with:
          node-version: "22" # the aggregated `sbt test` also runs protocolCoreJS tests under Node
      - name: Install the vetted JS crypto dep (@noble/hashes) for the Scala.js tests
        run: npm ci
      - uses: actions/cache@v5
        with:
          path: |
            ~/.cache/coursier
            ~/.sbt
            ~/.ivy2/cache
          key: sbt-${{ runner.os }}-${{ hashFiles('build.sbt', 'project/build.properties', 'project/plugins.sbt') }}
          restore-keys: sbt-${{ runner.os }}-
      - name: Test (all modules)
        run: sbt -batch -no-colors test
      - name: Labeling gate (T008) — a build without the real backend MUST report no privacy
        run: |
          CP="$(sbt -batch -no-colors -error 'export protocolCore/Runtime/fullClasspath' | tail -1)"
          out="$(printf '{}' | java -cp "$CP" cli.Pstatus show)"
          echo "pstatus -> $out"
          echo "$out" | grep -q '"metadataPrivate":false' \
            && echo "$out" | grep -q 'DEV, NO METADATA PRIVACY' \
            || { echo "::error::labeling gate failed — a dev build must report no metadata privacy (Constitution IV)"; exit 1; }

  rust:
    name: Rust — fmt + clippy + test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: oblivious-sidecar
    steps:
      - uses: actions/checkout@v7
      - name: Install protoc (tonic-build)
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: oblivious-sidecar
      - run: cargo fmt --all --check
      - run: cargo clippy --all-targets -- -D warnings
      - run: cargo test

  integration:
    name: Cross-process integration (Scala client ↔ Rust obsd)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Install libsodium + protoc
        run: sudo apt-get update && sudo apt-get install -y libsodium-dev protobuf-compiler
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "24"
      - uses: sbt/setup-sbt@v1
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: oblivious-sidecar
      - uses: actions/cache@v5
        with:
          path: |
            ~/.cache/coursier
            ~/.sbt
            ~/.ivy2/cache
          key: sbt-${{ runner.os }}-${{ hashFiles('build.sbt', 'project/build.properties', 'project/plugins.sbt') }}
          restore-keys: sbt-${{ runner.os }}-
      - name: Build obsd (the Rust sidecar binary)
        run: cargo build --bin obsd --manifest-path oblivious-sidecar/Cargo.toml
      - name: Run the cross-process integration test (Scala fronts ↔ obsd)
        run: OBSD_BIN="$(pwd)/oblivious-sidecar/target/debug/obsd" sbt -batch -no-colors "transport/testOnly transport.SidecarIntegrationSpec"

  scalajs:
    name: Scala.js engine — cross-build + link (T019)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "24"
      - uses: sbt/setup-sbt@v1
      - uses: actions/setup-node@v4
        with:
          node-version: "22" # Scala.js tests run under Node
      - name: Install the vetted JS crypto dep (@noble/hashes, pinned)
        run: npm ci
      - uses: actions/cache@v5
        with:
          path: |
            ~/.cache/coursier
            ~/.sbt
            ~/.ivy2/cache
          key: sbt-${{ runner.os }}-${{ hashFiles('build.sbt', 'project/build.properties', 'project/plugins.sbt') }}
          restore-keys: sbt-${{ runner.os }}-
      - name: Test the JS engine under Node (cross-platform KAT vs the JVM build)
        run: sbt -batch -no-colors "protocolCoreJS/test"
      - name: Link the production bundle (proves the @JSExportTopLevel facade emits)
        run: sbt -batch -no-colors "protocolCoreJS/fullLinkJS"
      - name: E2E — drive the linked bundle through the engine-api contract (as a consumer loads it)
        run: node protocol-core/js/e2e/engine-contract.cjs protocol-core-js/target/scala-3.3.4/protocol-core-js-opt/main.js

  flutter:
    name: Flutter — analyze + widget tests (T005)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: clients/flutter
    steps:
      - uses: actions/checkout@v7
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.44.2"
          channel: stable
          cache: true
      - run: flutter pub get
      - run: flutter analyze
      - run: flutter test

  hygiene:
    name: Hygiene — pinned deps + secret scan (T007)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Pinned dependencies (reproducible builds, Constitution XI)
        run: |
          grep -q '^sbt.version=' project/build.properties || { echo "::error::sbt.version must be pinned"; exit 1; }
          test -f oblivious-sidecar/Cargo.lock || { echo "::error::Cargo.lock must be committed"; exit 1; }
          test -f package-lock.json || { echo "::error::package-lock.json must be committed (pinned JS deps)"; exit 1; }
          echo "pinned-deps OK"
      - name: Secret scan (gitleaks)
        run: |
          VER=8.21.2
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${VER}/gitleaks_${VER}_linux_x64.tar.gz" | tar -xz gitleaks
          ./gitleaks detect --no-git --source . --config .gitleaks.toml --redact --no-banner
