name: CI

on:
  push:
    branches: ["**"]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  jvm:
    name: JVM — sbt test + labeling gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Install libsodium (crypto FFM tests)
        run: sudo apt-get update && sudo apt-get install -y libsodium-dev
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "24" # Foreign Function & Memory API is final since 22
      - uses: sbt/setup-sbt@v1
      # No Node here: the JS engine tests run in the `scalajs` job, so this job stays JVM-only.
      - uses: actions/cache@v6
        with:
          path: |
            ~/.cache/coursier
            ~/.sbt
            ~/.ivy2/cache
          key: sbt-${{ runner.os }}-${{ hashFiles('build.sbt', 'project/build.properties', 'project/plugins.sbt', 'project/V.scala') }}
          restore-keys: sbt-${{ runner.os }}-
      - name: Test the JVM modules + labeling gate (T008) in one sbt session
        run: |
          set -o pipefail
          # One sbt session (`;`-chained) avoids a second cold JVM/project-load. `;` aborts on the
          # first failing command, so a test failure fails the step before the gate runs. `testJvm`
          # (defined in build.sbt next to the aggregate) runs the JVM modules; the JS module is
          # covered by the scalajs job, so it is intentionally not run here.
          sbt -batch -no-colors ';testJvm ;protocolCore/runMain cli.Pstatus show' 2>&1 | tee /tmp/sbt.out
          # Labeling gate: a build without the real backend MUST report no metadata privacy. sbt 2.0's
          # `export fullClasspath` yields virtual ${OUT} paths (not a usable -cp), so we read the CLI's
          # JSON from the session log — but isolate the one line that is `cli.Pstatus`'s actual output
          # (it carries BOTH "backend" and "metadataPrivate") so incidental test stdout can't satisfy
          # the gate. Fail-closed: a missing/regressed line fails the step.
          gate="$(grep '"metadataPrivate"' /tmp/sbt.out | grep '"backend"' | tail -1)"
          echo "pstatus -> $gate"
          echo "$gate" | grep -q '"metadataPrivate":false' \
            && echo "$gate" | grep -q 'DEV, NO METADATA PRIVACY' \
            || { echo "::error::labeling gate failed — a dev build must report no metadata privacy (Constitution IV)"; exit 1; }

  lint:
    name: Lint — scalafmt (Scala formatting)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      # Standalone scalafmt via Coursier — no sbt cold start, so this gate is fast and parallel.
      # Pinned to the .scalafmt.conf version; generated code is excluded there (project.excludePaths).
      - uses: coursier/setup-action@v3
        with:
          jvm: temurin:24
          apps: scalafmt:3.8.3
      - name: Check Scala formatting (scalafmt --test)
        run: scalafmt --test

  rust:
    name: Rust — fmt + clippy + test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: oblivious-sidecar
    steps:
      - uses: actions/checkout@v7
      - name: Install protoc (tonic-build)
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: oblivious-sidecar
      - run: cargo fmt --all --check
      - run: cargo clippy --all-targets -- -D warnings
      - run: cargo test

  integration:
    name: Cross-process integration (Scala client ↔ Rust obsd)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Install libsodium + protoc
        run: sudo apt-get update && sudo apt-get install -y libsodium-dev protobuf-compiler
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "24"
      - uses: sbt/setup-sbt@v1
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: oblivious-sidecar
      - uses: actions/cache@v6
        with:
          path: |
            ~/.cache/coursier
            ~/.sbt
            ~/.ivy2/cache
          key: sbt-${{ runner.os }}-${{ hashFiles('build.sbt', 'project/build.properties', 'project/plugins.sbt', 'project/V.scala') }}
          restore-keys: sbt-${{ runner.os }}-
      - name: Build obsd (the Rust sidecar binary)
        run: cargo build --bin obsd --manifest-path oblivious-sidecar/Cargo.toml
      - name: Run the cross-process integration test (Scala fronts ↔ obsd)
        run: OBSD_BIN="$(pwd)/oblivious-sidecar/target/debug/obsd" sbt -batch -no-colors "transport/testOnly transport.SidecarIntegrationSpec"

  scalajs:
    name: Scala.js engine — cross-build + link (T019)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "24"
      - uses: sbt/setup-sbt@v1
      - uses: actions/setup-node@v6
        with:
          node-version: "22" # Scala.js tests run under Node
      - name: Install the vetted JS crypto dep (@noble/hashes, pinned)
        run: npm ci
      - uses: actions/cache@v6
        with:
          path: |
            ~/.cache/coursier
            ~/.sbt
            ~/.ivy2/cache
          key: sbt-${{ runner.os }}-${{ hashFiles('build.sbt', 'project/build.properties', 'project/plugins.sbt', 'project/V.scala') }}
          restore-keys: sbt-${{ runner.os }}-
      - name: Test the JS engine under Node + link the production bundle (one sbt session)
        # `;`-chained so the cross-platform KAT test and the @JSExportTopLevel link share one cold start.
        run: sbt -batch -no-colors ';protocolCoreJS/test ;protocolCoreJS/fullLinkJS'
      - name: E2E — drive the linked bundle through the engine-api contract (as a consumer loads it)
        # sbt 2.0 centralizes build outputs under target/out/<platform>/… (was protocol-core-js/target/…).
        run: node protocol-core/js/e2e/engine-contract.cjs target/out/sjs1/scala-3.3.4/protocol-core-js/protocol-core-js-opt/main.js

  flutter:
    name: Flutter — analyze + widget tests (T005)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: clients/flutter
    steps:
      - uses: actions/checkout@v7
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.44.2"
          channel: stable
          cache: true
      - run: flutter pub get
      - run: flutter analyze
      - run: flutter test

  hygiene:
    name: Hygiene — pinned deps + secret scan (T007)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Pinned dependencies (reproducible builds, Constitution XI)
        run: |
          grep -q '^sbt.version=' project/build.properties || { echo "::error::sbt.version must be pinned"; exit 1; }
          test -f oblivious-sidecar/Cargo.lock || { echo "::error::Cargo.lock must be committed"; exit 1; }
          test -f package-lock.json || { echo "::error::package-lock.json must be committed (pinned JS deps)"; exit 1; }
          echo "pinned-deps OK"
      - name: Secret scan (gitleaks)
        run: |
          VER=8.21.2
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${VER}/gitleaks_${VER}_linux_x64.tar.gz" | tar -xz gitleaks
          ./gitleaks detect --no-git --source . --config .gitleaks.toml --redact --no-banner
