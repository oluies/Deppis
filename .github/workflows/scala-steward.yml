name: Scala Steward

# Opens PRs for Scala/sbt dependency updates (Dependabot does not support sbt). Runs from the
# DEFAULT branch on a schedule, so it activates once this branch is merged to main.
on:
  schedule:
    - cron: "0 6 * * 1" # Mondays 06:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  scala-steward:
    runs-on: ubuntu-latest
    steps:
      - name: Run Scala Steward
        uses: scala-steward-org/scala-steward-action@v2
        with:
          # A PAT or GitHub App token (secret SCALA_STEWARD_TOKEN) is recommended so Steward's PRs
          # trigger CI; falls back to the workflow token (PRs then won't re-trigger workflows).
          github-token: ${{ secrets.SCALA_STEWARD_TOKEN || github.token }}
